name: carecoins_flutter
description: CareCoins Flutter frontend (web, iOS, Android) — port of the Vue frontend.
publish_to: "none"
version: 0.1.0

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  provider: ^6.1.2
  http: ^1.2.2
  intl: ">=0.19.0 <0.21.0"
  google_fonts: ^6.2.1
  firebase_core: ^3.8.0
  firebase_auth: ^5.3.3
  google_sign_in: ^6.2.2
  qr_flutter: ^4.1.0
  image_picker: ^1.2.3
  firebase_messaging: ^15.2.10
  shared_preferences: ^2.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.3

flutter:
  uses-material-design: true
  assets:
    - assets/icon/icon-512.png

# Launcher icons generated from the same CareCoins mark the Vue PWA uses
# (frontend/public/icon-512.png). Regenerate after changing the icon with:
#   dart run flutter_launcher_icons
flutter_launcher_icons:
  image_path: assets/icon/icon-512.png
  android: true
  ios: true
  remove_alpha_ios: true
  background_color_ios: "#F26B5E"
  # Adaptive icon: solid coral base (sampled from the icon itself) with the
  # coin mark as foreground, so round/squircle masks blend seamlessly.
  adaptive_icon_background: "#F26B5E"
  adaptive_icon_foreground: assets/icon/icon-512.png
  web:
    generate: false
