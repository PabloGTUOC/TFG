server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Proxy API requests to the backend service (internal Docker network)
    location /api/ {
        proxy_pass         http://backend:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # Proxy uploaded files (avatars) to the backend
    location /uploads/ {
        proxy_pass         http://backend:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
    }

    # Service workers and the Flutter bootstrap must never be cached so
    # browsers detect new deployments immediately.
    location ~* (flutter_service_worker\.js|firebase-messaging-sw\.js|flutter_bootstrap\.js|version\.json)$ {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        try_files $uri =404;
    }

    # index.html must not be cached either — it references the new build
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        try_files $uri =404;
    }

    # CanvasKit and asset bundles are versioned by the service worker;
    # a day of caching keeps reloads fast without pinning stale builds.
    location ~* ^/(canvaskit|assets)/ {
        add_header Cache-Control "public, max-age=86400";
        try_files $uri =404;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }
}
