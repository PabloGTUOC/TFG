services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: carecoins
      POSTGRES_PASSWORD: carecoins
      POSTGRES_DB: carecoins
    ports:
      - '5433:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data

  db-init:
    build: ./backend
    environment:
      DATABASE_URL: postgres://carecoins:carecoins@postgres:5432/carecoins
    depends_on:
      postgres:
        condition: service_started
    command: npm run db:init

  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgres://carecoins:carecoins@postgres:5432/carecoins
      PORT: 3000
      FIREBASE_PROJECT_ID: local-dev
    depends_on:
      db-init:
        condition: service_completed_successfully
      postgres:
        condition: service_started
    ports:
      - '3000:3000'

  frontend:
    build: ./frontend
    depends_on:
      - backend
    ports:
      - '5173:80'

volumes:
  pgdata:
