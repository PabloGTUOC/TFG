services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: carecoins
      POSTGRES_PASSWORD: carecoins
      POSTGRES_DB: carecoins
    volumes:
      - pgdata:/var/lib/postgresql/data
    # No ports exposed — only accessible to other services on the internal network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U carecoins -d carecoins"]
      interval: 5s
      timeout: 5s
      retries: 10

  db-init:
    build: ./backend
    environment:
      DATABASE_URL: postgres://carecoins:carecoins@postgres:5432/carecoins
    depends_on:
      postgres:
        condition: service_healthy
    command: npm run db:init

  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgres://carecoins:carecoins@postgres:5432/carecoins
      PORT: 3000
      NODE_ENV: production
      # Path to the Firebase service account key mounted below
      GOOGLE_APPLICATION_CREDENTIALS: /run/secrets/firebase-credentials.json
    env_file:
      - ./backend/.env
    depends_on:
      db-init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
    volumes:
      - ./backend/uploads:/app/uploads
      # Download your service account JSON from Firebase Console → Project Settings
      # → Service Accounts → Generate new private key, then place it here:
      - ./firebase-credentials.json:/run/secrets/firebase-credentials.json:ro
    # No ports exposed — nginx in the frontend container proxies /api and /uploads

  frontend:
    build:
      context: ./frontend
      args:
        # Empty string so fetch('/api/...') goes to the same origin (proxied by nginx)
        VITE_API_BASE: ""
        # Firebase client config — set these in a .env file next to docker-compose.yml
        VITE_FIREBASE_API_KEY: ${VITE_FIREBASE_API_KEY}
        VITE_FIREBASE_AUTH_DOMAIN: ${VITE_FIREBASE_AUTH_DOMAIN}
        VITE_FIREBASE_PROJECT_ID: ${VITE_FIREBASE_PROJECT_ID}
        VITE_FIREBASE_STORAGE_BUCKET: ${VITE_FIREBASE_STORAGE_BUCKET}
        VITE_FIREBASE_MESSAGING_SENDER_ID: ${VITE_FIREBASE_MESSAGING_SENDER_ID}
        VITE_FIREBASE_APP_ID: ${VITE_FIREBASE_APP_ID}
        VITE_FIREBASE_VAPID_KEY: ${VITE_FIREBASE_VAPID_KEY}
    depends_on:
      - backend
    ports:
      - '80:80'   # Cloudflare → port 80 on the server → this container

volumes:
  pgdata:
