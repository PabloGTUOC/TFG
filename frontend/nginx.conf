server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Proxy API requests to the backend service (internal Docker network)
    location /api/ {
        proxy_pass         http://backend:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # Proxy uploaded files (avatars) to the backend
    location /uploads/ {
        proxy_pass         http://backend:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
    }

    # Service worker must never be cached so browsers detect updates immediately
    location ~* (sw\.js|workbox-.*\.js|registerSW\.js)$ {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        try_files $uri =404;
    }

    # Hashed assets are immutable — safe to cache forever
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # index.html must not be cached so the new SW manifest is always fetched
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        try_files $uri =404;
    }

    # SPA fallback — Vue Router history mode needs this
    location / {
        try_files $uri $uri/ /index.html;
    }
}
